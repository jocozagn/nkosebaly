services:
  postgres:
    image: postgres:16-alpine
    container_name: nko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nko
      POSTGRES_PASSWORD: nko_change_me
      POSTGRES_DB: nko
    ports:
      - "5432:5432"
    volumes:
      - nko_pg_data:/var/lib/postgresql/data
      - ./scripts/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  nko_pg_data:
